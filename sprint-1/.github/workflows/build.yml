name: build

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14.7
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hedb
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
          cache: 'maven' # Built-in caching is simpler than actions/cache

      - name: Run backend unit tests
        working-directory: ./backend
        run: mvn clean test -Ptest # Only clean here

      - name: Register backend code coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          file: ./backend/target/site/jacoco/jacoco.xml

      - name: Publish Test Reports
        uses: scacap/action-surefire-report@v1
        if: always() # Run even if tests fail
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Run integration tests
        working-directory: ./backend
        run: mvn verify -Ptest-int -DskipUnitTests # No clean, skip unit tests (already done)
        env:
          PSQL_INT_TEST_DB_USERNAME: "postgres"
          PSQL_INT_TEST_DB_PASSWORD: "postgres"

      - name: Start backend & Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          # This runs the backend in the background AND starts the frontend
          start: npm start, mvn -f ../backend/pom.xml spring-boot:run -Ptest-int
          wait-on: 'http://localhost:8081'
          record: false
        env:
          PSQL_INT_TEST_DB_USERNAME: "postgres"
          PSQL_INT_TEST_DB_PASSWORD: "postgres"
          cypress_psql_db_name: "hedb"
          cypress_psql_db_username: "postgres"
          cypress_psql_db_password: "postgres"
          cypress_psql_db_host: "localhost"
          cypress_psql_db_port: "5432"

